name: Django CI/CD with Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r server/requirements.txt
    - name: Run Linter
      run: |
        flake8 server/ --ignore=E501,F401 --exclude=*/migrations/*,*/__init__.py
    - name: Run Migrations
      run: |
        python server/manage.py makemigrations dealership
        python server/manage.py migrate
    - name: Complete job
      run: echo "Lint Python job completed successfully"

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: server/frontend
      run: npm install
    - name: Run Linter
      working-directory: server/frontend
      run: |
        npx eslint src/ --ext .js,.jsx || echo "Lint warnings found"
    - name: Complete job
      run: echo "Lint JavaScript job completed successfully"
